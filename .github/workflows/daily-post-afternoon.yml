name: Daily Post -- Afternoon

# Afternoon posting window: 3:00 PM ET (20:00 UTC)
# Posts 1 pin with random jitter (0-15 min delay from trigger)
on:
  schedule:
    - cron: '0 20 * * *'  # 20:00 UTC = 3:00 PM ET, daily
  workflow_dispatch:
    inputs:
      date_override:
        description: 'Post pins for a specific date (YYYY-MM-DD) instead of today'
        required: false
        default: ''

concurrency:
  group: slated-content-engine-posting
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}

jobs:
  post-afternoon:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Refresh Pinterest token
        run: python -m src.pinterest.token_manager

      - name: Post pins for afternoon slot
        run: python -m src.pinterest.post_pins afternoon ${{ inputs.date_override && format('--date={0}', inputs.date_override) || '' }}

      - name: Commit updated data files
        uses: ./.github/actions/commit-data
        with:
          message: "chore: update post log [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Daily Post -- Afternoon"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
