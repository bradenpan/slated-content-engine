name: Pinterest Weekly Review

# Pinterest-specific weekly review: performance analysis + content plan -> Sheet
# Runs Monday 6am ET (11:00 UTC) -- after collect-analytics.yml (5:30am ET)
# Analytics data and content memory are already fresh from the collection step.
on:
  schedule:
    - cron: '0 11 * * 1'  # 11:00 UTC = 6:00 AM ET, Monday
  workflow_dispatch:       # Manual fallback trigger via GitHub UI

concurrency:
  group: slated-content-engine
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  pinterest-weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Run weekly performance analysis
        # Calls Claude Sonnet to analyze last week's performance
        run: python -m src.pinterest.weekly_analysis

      - name: Generate weekly content plan
        # Calls Claude Sonnet with strategy + analysis + memory + seasonal context
        # Writes results to Google Sheet "Weekly Review" tab
        # Sends Slack notification internally
        run: python -m src.pinterest.generate_weekly_plan

      - name: Commit updated data files
        uses: ./.github/actions/commit-data
        with:
          message: "chore: update post log [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Pinterest Weekly Review"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
