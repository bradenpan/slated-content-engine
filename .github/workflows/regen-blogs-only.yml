name: Regen Blogs Only

# One-time manual workflow to regenerate W10 blog MDX files.
# The .gitignore fix (removing data/generated/blog/ directory rule) means
# these files will now be committed and available for deploy-to-preview.
# DELETE THIS WORKFLOW after W10 blogs have deployed successfully.
on:
  workflow_dispatch:

concurrency:
  group: pinterest-pipeline
  cancel-in-progress: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  regen-blogs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Generate blog posts
        run: python -m src.generate_blog_posts

      - name: Summarize results
        run: |
          echo "## Blog Regeneration Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/blog-generation-results.json ]; then
            count=$(find data/generated/blog -name "*.mdx" | wc -l)
            echo "**MDX files generated:** $count" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/blog-generation-results.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No blog-generation-results.json found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit regenerated blog posts
        uses: ./.github/actions/commit-data
        with:
          message: "chore: regenerate W10 blog posts [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Regen Blogs Only"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
