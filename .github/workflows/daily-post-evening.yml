name: Daily Post -- Evening

# Evening posting window: 8:00 PM ET (01:00 UTC next day)
# Posts 2 pins with random jitter (0-15 min delay from trigger,
# 5-20 min gap between pins)
# Peak Pinterest usage window (8-11 PM)
on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC = 8:00 PM ET (previous day), daily
  workflow_dispatch:      # Manual fallback trigger

concurrency:
  group: pinterest-posting
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}

jobs:
  post-evening:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Refresh Pinterest token
        run: python -m src.token_manager

      - name: Post pins for evening slot
        run: python -m src.post_pins evening

      - name: Commit updated data files
        uses: ./.github/actions/commit-data
        with:
          message: "chore: update post log [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Daily Post -- Evening"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
