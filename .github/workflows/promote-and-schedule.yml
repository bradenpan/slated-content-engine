name: Promote to Production & Schedule Pins

# Triggered by production approval in Google Sheet (via Apps Script -> repository_dispatch)
# Merges develop -> main on goslated.com, verifies URLs, schedules pins
on:
  repository_dispatch:
    types: [promote-and-schedule]
  workflow_dispatch:
    inputs:
      override_pin_start_date:
        description: 'Override pin schedule start date (YYYY-MM-DD). Redistributes all pins across 3 days starting from this date. Leave empty for normal scheduling.'
        required: false
        default: ''

concurrency:
  group: pinterest-pipeline
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}
  UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  promote-and-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh Pinterest token
        run: python -m src.token_manager

      - name: Merge develop to main, verify, and schedule pins
        # Merges develop -> main on goslated.com (triggers Vercel production deploy)
        # Verifies blog post URLs are live on production
        # Creates pin posting schedule (data/pin-schedule.json)
        # Appends entries to content-log.jsonl
        # Updates Sheet and sends Slack notification
        run: python -m src.blog_deployer promote

      - name: Override pin schedule dates (test mode)
        if: ${{ github.event.inputs.override_pin_start_date != '' }}
        run: |
          python -c "
          import json
          from datetime import datetime, timedelta
          from pathlib import Path

          start = datetime.strptime('${{ github.event.inputs.override_pin_start_date }}', '%Y-%m-%d').date()
          schedule_path = Path('data/pin-schedule.json')
          if not schedule_path.exists():
              print('No pin-schedule.json found, skipping redate')
              exit(0)

          schedule = json.loads(schedule_path.read_text())
          slots = ['morning', 'afternoon', 'evening-1', 'evening-2']
          num_days = 3  # spread across 3 days
          total_slots = num_days * len(slots)

          for i, pin in enumerate(schedule):
              day_offset = (i // len(slots)) % num_days
              slot_idx = i % len(slots)
              pin['scheduled_date'] = (start + timedelta(days=day_offset)).isoformat()
              pin['scheduled_slot'] = slots[slot_idx]

          schedule_path.write_text(json.dumps(schedule, indent=2))
          print(f'Redated {len(schedule)} pins across {num_days} days starting {start}')
          for d in range(num_days):
              day = start + timedelta(days=d)
              day_pins = [p for p in schedule if p['scheduled_date'] == day.isoformat()]
              print(f'  {day}: {len(day_pins)} pins')
          "

      - name: Commit updated data files
        run: |
          git config user.name "pinterest-pipeline-bot"
          git config user.email "bot@pinterest-pipeline.local"
          git add data/ analysis/
          git diff --staged --quiet || git commit -m "chore: production deploy + pin schedule [skip ci]"
          git pull --rebase
          git push

      - name: Notify failure
        if: failure()
        run: |
          python -c "
          from src.apis.slack_notify import SlackNotify
          notifier = SlackNotify()
          notifier.notify_failure('${{ github.workflow }}', 'Production promotion failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
