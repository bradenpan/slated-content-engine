name: Generate Content

# Triggered by plan approval in Google Sheet (via Apps Script -> repository_dispatch)
on:
  repository_dispatch:
    types: [generate-content]
  workflow_dispatch:  # Manual fallback trigger

concurrency:
  group: slated-content-engine
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
  GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Puppeteer
        # NEEDED -- pin_assembler.py calls render_pin.js (Puppeteer) to render HTML/CSS templates to PNG
        run: npm install puppeteer

      - name: Refresh Pinterest token
        run: python -m src.pinterest.token_manager

      - name: Generate blog posts (blog-first workflow)
        # Step 1: Generate all blog posts from approved plan
        # Must complete before pin generation (pins reference blog content)
        run: python -m src.shared.generate_blog_posts

      - name: Generate pin content (copy + images + rendered PNGs)
        # Step 2: Generate pin titles, descriptions, alt text, overlay text
        # Generate AI images and render pin PNGs
        # Render final pin PNGs via Puppeteer
        run: python -m src.pinterest.generate_pin_content

      - name: Publish Content Queue for review
        # Uploads pin images to GCS (or Drive fallback) for inline Sheet preview
        # Writes Content Queue with IMAGE() formulas and blog summaries
        # Sends Slack notification that content is ready for review
        run: python -m src.pinterest.publish_content_queue

      - name: Commit generated content and image URLs
        uses: ./.github/actions/commit-data
        with:
          message: "chore: generated content + image URLs [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Generate Content"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
