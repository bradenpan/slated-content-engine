name: Deploy to Preview

# Triggered by content approval in Google Sheet (via Apps Script -> repository_dispatch)
# Deploys blog posts to goslated.com DEVELOP branch (Vercel preview deployment)
# Does NOT push to production — that requires separate promotion approval
on:
  repository_dispatch:
    types: [deploy-to-preview]
  workflow_dispatch:  # Manual fallback trigger

concurrency:
  group: pinterest-pipeline
  cancel-in-progress: false

env:
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}

jobs:
  deploy-to-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Deploy blog posts to develop branch
        # Commits approved MDX files + hero images to goslated.com develop branch
        # Vercel auto-creates a preview deployment for the develop branch
        # Writes PRODUCTION status to Sheet for promotion approval
        # Sends Slack notification with review instructions
        run: python -m src.shared.blog_deployer preview

      - name: Commit updated data files
        uses: ./.github/actions/commit-data
        with:
          message: "chore: preview deploy data [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Deploy to Preview"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
