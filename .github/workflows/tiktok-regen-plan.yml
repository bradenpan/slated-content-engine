name: TikTok Regen Plan

# Triggered by Apps Script when Weekly Review B5 = "regen" (via repository_dispatch)
on:
  repository_dispatch:
    types: [tiktok-regen-plan]
  workflow_dispatch:  # Manual fallback trigger

concurrency:
  group: slated-content-engine-tiktok
  cancel-in-progress: false

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  TIKTOK_SPREADSHEET_ID: ${{ secrets.TIKTOK_SPREADSHEET_ID }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  tiktok-regen-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest (plan JSON from previous runner)
        run: git pull --rebase origin main

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Regenerate flagged carousel specs
        run: python -m src.tiktok.regen_plan

      - name: Commit updated plan
        uses: ./.github/actions/commit-data
        with:
          message: "chore: regenerated TikTok plan specs [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "TikTok Regen Plan"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
