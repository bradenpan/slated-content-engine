name: Weekly Review

# Runs Monday 6am ET (11:00 UTC) -- analytics + analysis + content plan -> Sheet
# Ready before you sit down Monday morning
on:
  schedule:
    - cron: '0 11 * * 1'  # 11:00 UTC = 6:00 AM ET, Monday
  workflow_dispatch:       # Manual fallback trigger via GitHub UI

concurrency:
  group: pinterest-pipeline
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Refresh Pinterest token
        run: python -m src.token_manager

      - name: Pull Pinterest analytics
        run: python -m src.pull_analytics

      - name: Generate content memory summary
        # Python computation only -- no LLM call
        # Reads content-log.jsonl, computes aggregates, writes content-memory-summary.md
        run: python -c "from src.weekly_analysis import generate_content_memory_summary; generate_content_memory_summary()"

      - name: Run weekly performance analysis
        # Calls Claude Sonnet to analyze last week's performance
        run: python -m src.weekly_analysis

      - name: Generate weekly content plan
        # Calls Claude Sonnet with strategy + analysis + memory + seasonal context
        # Writes results to Google Sheet "Weekly Review" tab
        # Sends Slack notification internally
        run: python -m src.generate_weekly_plan

      - name: Commit updated data files
        uses: ./.github/actions/commit-data
        with:
          message: "chore: update analytics and data files [skip ci]"

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Weekly Review"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
