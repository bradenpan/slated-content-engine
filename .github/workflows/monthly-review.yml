name: Monthly Review

# Runs 1st Monday of each month at 5am ET (10:00 UTC), before the weekly review
# Deep 30-day analysis using Claude Opus for deeper strategic reasoning
on:
  schedule:
    # Runs at 10:00 UTC (5:00 AM ET) on Mondays, but only triggers
    # the job on the 1st-7th of the month (covers the first Monday)
    - cron: '0 10 1-7 * 1'  # Minutes:0, Hour:10 UTC, Day:1-7, Any month, Monday
  workflow_dispatch:          # Manual fallback trigger

concurrency:
  group: pinterest-pipeline
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}
  UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  monthly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh Pinterest token
        run: python -m src.token_manager

      - name: Pull 30-day analytics
        run: python -c "from src.pull_analytics import pull_analytics; pull_analytics(days_back=30)"

      - name: Run monthly strategy review (Claude Opus)
        # Deep analysis: pillar performance, keyword strategy, board architecture,
        # posting cadence, template effectiveness, image source comparison,
        # strategy update recommendations
        # Writes results to Google Sheet and sends Slack notification internally
        run: python -m src.monthly_review

      - name: Commit monthly analysis files
        run: |
          git config user.name "pinterest-pipeline-bot"
          git config user.email "bot@pinterest-pipeline.local"
          git add data/ analysis/
          git diff --staged --quiet || git commit -m "chore: update analytics and data files [skip ci]"
          git push

      - name: Notify failure
        if: failure()
        run: |
          python -c "
          from src.apis.slack_notify import SlackNotify
          notifier = SlackNotify()
          notifier.notify_failure('${{ github.workflow }}', 'Workflow failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          "
