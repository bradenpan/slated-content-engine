name: Monthly Review

# Runs 1st Monday of each month at 4am ET (9:00 UTC), well before weekly review (6am ET)
# Deep 30-day analysis using Claude Opus for deeper strategic reasoning
#
# NOTE: cron day-of-month + day-of-week fields combine with OR (POSIX behavior),
# so '0 9 1-7 * 1' fires on ANY Monday OR days 1-7 — not just Mondays that are
# days 1-7. The guard step below filters to first-Monday-only at runtime.
on:
  schedule:
    - cron: '0 9 1-7 * 1'   # 9:00 UTC = 4:00 AM ET; fires every Monday (OR days 1-7)
  workflow_dispatch:          # Manual fallback trigger (bypasses first-Monday check)

concurrency:
  group: pinterest-pipeline
  cancel-in-progress: false

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
  GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
  GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  GOSLATED_REPO: ${{ secrets.GOSLATED_REPO }}
  GOSLATED_GITHUB_TOKEN: ${{ secrets.GOSLATED_GITHUB_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  monthly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Guard — first Monday only
        id: guard
        if: github.event_name == 'schedule'
        run: |
          DAY=$(TZ=America/New_York date +%-d)
          DOW=$(TZ=America/New_York date +%u)  # 1=Monday, 7=Sunday
          if [ "$DAY" -gt 7 ] || [ "$DOW" -ne 1 ]; then
            echo "::notice::Not the first Monday of the month (day=$DAY, dow=$DOW). Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "First Monday confirmed (day=$DAY, dow=$DOW). Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pipeline
        if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/setup-pipeline

      - name: Refresh Pinterest token
        if: steps.guard.outputs.skip != 'true'
        run: python -m src.token_manager

      - name: Pull 30-day analytics
        if: steps.guard.outputs.skip != 'true'
        run: python -m src.pull_analytics 30

      - name: Run monthly strategy review (Claude Opus)
        if: steps.guard.outputs.skip != 'true'
        # Deep analysis: pillar performance, keyword strategy, board architecture,
        # posting cadence, template effectiveness, image source comparison,
        # strategy update recommendations
        # Writes results to Google Sheet and sends Slack notification internally
        run: python -m src.monthly_review

      - name: Commit monthly analysis files
        if: steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/commit-data
        with:
          message: "chore: update analytics and data files [skip ci]"

      - name: Notify failure
        if: failure() && steps.guard.outputs.skip != 'true'
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Monthly Review"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
