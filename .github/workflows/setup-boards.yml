name: Setup Pinterest Boards

# One-time manual workflow to create all Pinterest boards and sections
# defined in strategy/board-structure.json.
# Safe to rerun — skips boards that already exist.
on:
  workflow_dispatch:

env:
  PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
  PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
  PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
  PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
  PINTEREST_ENVIRONMENT: production
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  setup-boards:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pipeline
        uses: ./.github/actions/setup-pipeline

      - name: Refresh Pinterest token
        run: python -m src.token_manager

      - name: Create boards and sections
        run: python -m src.setup_boards

      - name: Notify failure
        if: failure()
        uses: ./.github/actions/notify-failure
        with:
          workflow_name: "Setup Pinterest Boards"
          run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
