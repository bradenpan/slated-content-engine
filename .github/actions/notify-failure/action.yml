name: Notify Failure
description: Send Slack notification on workflow failure
inputs:
  workflow_name:
    description: Name of the failed workflow
    required: true
  run_url:
    description: URL to the failed run
    required: true
runs:
  using: composite
  steps:
    - env:
        WORKFLOW_NAME: ${{ inputs.workflow_name }}
        RUN_URL: ${{ inputs.run_url }}
      run: |
        python -c "
        import os
        from src.apis.slack_notify import SlackNotify
        notifier = SlackNotify()
        notifier.notify_failure(os.environ['WORKFLOW_NAME'], 'Workflow failed. Check: ' + os.environ['RUN_URL'])
        "
      shell: bash
