name: Commit Data Files
description: Commit and push data file changes
inputs:
  message:
    description: Commit message
    required: true
runs:
  using: composite
  steps:
    - run: |
        git config user.name "pinterest-pipeline-bot"
        git config user.email "bot@pinterest-pipeline.local"
        git add data/content-log.jsonl data/pin-schedule.json data/content-memory-summary.md data/blog-generation-results.json data/pin-generation-results.json data/weekly-plan-*.json data/posting-failures.json data/board-ids.json analysis/
        git diff --staged --quiet || git commit -m "${{ inputs.message }}"
        git pull --rebase
        git push
      shell: bash
