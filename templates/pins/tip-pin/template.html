<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1000">
    <title>Tip/How-To Pin</title>
    {{styles}}
</head>
<body>
    <!--
    Tip/How-To Pin Template
    =======================
    Text-heavier than recipe pin. Value is in the information.

    Variables:
      {{background_image_url}} - Lifestyle or abstract background image
      {{headline}}              - Tip/guide headline, 6-8 words max
      {{bullet_1}}              - First bullet point
      {{bullet_2}}              - Second bullet point
      {{bullet_3}}              - Third bullet point (optional, may be empty)
      {{logo_url}}              - Brand logo placeholder
      {{variant}}               - A, B, or C

    Variants:
      A — Centered text over dimmed background image
      B — Top/bottom split: image top 40%, text bottom 60%
      C — Full branded background (template-only, no photo) with large text
    -->

    <!-- ==================== VARIANT A: Centered Over Dimmed Background ==================== -->
    <div class="pin-canvas variant-a" data-variant="A" style="display: none;">
        <div class="tip-a-bg bg-image-cover" style="background-image: url('{{background_image_url}}');"></div>
        <div class="tip-a-overlay"></div>
        <div class="tip-a-content safe-zone z-2">
            <div class="tip-a-top">
                <div class="text-label color-accent" style="margin-bottom: 20px;">{{category_label}}</div>
                <h1 class="text-headline color-light text-center shadow-text">{{headline}}</h1>
                <div class="divider-line-light" style="width: 80px; margin: 28px auto;"></div>
            </div>
            <div class="tip-a-bullets">
                <div class="tip-bullet-row">
                    <div class="bullet-marker"></div>
                    <p class="text-body color-light shadow-text-subtle">{{bullet_1}}</p>
                </div>
                <div class="tip-bullet-row">
                    <div class="bullet-marker"></div>
                    <p class="text-body color-light shadow-text-subtle">{{bullet_2}}</p>
                </div>
                <div class="tip-bullet-row tip-bullet-optional">
                    <div class="bullet-marker"></div>
                    <p class="text-body color-light shadow-text-subtle">{{bullet_3}}</p>
                </div>
            </div>
            <div class="tip-a-bottom">
                <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-light" style="font-size: 26px; opacity: 0.6;">Slated.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== VARIANT B: Top/Bottom Split ==================== -->
    <div class="pin-canvas variant-b" data-variant="B" style="display: none;">
        <div class="tip-b-image-section bg-image-cover" style="background-image: url('{{background_image_url}}');"></div>
        <div class="tip-b-text-section">
            <div class="tip-b-text-inner safe-zone">
                <h1 class="text-headline color-light text-center">{{headline}}</h1>
                <div class="tip-b-bullets">
                    <div class="tip-bullet-row">
                        <div class="bullet-marker"></div>
                        <p class="text-body color-light" style="opacity: 0.92;">{{bullet_1}}</p>
                    </div>
                    <div class="tip-bullet-row">
                        <div class="bullet-marker"></div>
                        <p class="text-body color-light" style="opacity: 0.92;">{{bullet_2}}</p>
                    </div>
                    <div class="tip-bullet-row tip-bullet-optional">
                        <div class="bullet-marker"></div>
                        <p class="text-body color-light" style="opacity: 0.92;">{{bullet_3}}</p>
                    </div>
                </div>
                <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
                <div class="brand-logo" style="margin-top: auto; padding-top: 24px;">
                    <span class="brand-logo-icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-light" style="font-size: 24px; opacity: 0.6;">Slated.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== VARIANT C: Full Branded Graphic ==================== -->
    <div class="pin-canvas variant-c" data-variant="C" style="display: none;">
        <div class="tip-c-bg"></div>
        <div class="tip-c-content safe-zone z-2">
            <div class="tip-c-top">
                <div class="text-label color-secondary" style="margin-bottom: 24px; opacity: 0.7;">{{category_label}}</div>
                <h1 class="text-display color-light text-center">{{headline}}</h1>
                <div class="accent-bar" style="margin: 32px auto;"></div>
            </div>
            <div class="tip-c-bullets">
                <div class="tip-c-bullet-card">
                    <p class="text-body color-light">{{bullet_1}}</p>
                </div>
                <div class="tip-c-bullet-card">
                    <p class="text-body color-light">{{bullet_2}}</p>
                </div>
                <div class="tip-c-bullet-card tip-bullet-optional">
                    <p class="text-body color-light">{{bullet_3}}</p>
                </div>
            </div>
            <div class="tip-c-bottom">
                <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 24px; height: 24px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFBEB" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-secondary" style="font-size: 28px; opacity: 0.6;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
