<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1000">
    <title>Infographic Pin</title>
    {{styles}}
</head>
<body>
    <!--
    Infographic Pin Template
    ========================
    Structured information design. Minimal photography, brand colors forward.

    Variables:
      {{title}}       - Infographic title, 6-8 words max
      {{steps}}       - HTML step blocks (generated by assembler from array of {number, text})
      {{footer_text}} - Footer text (optional call-to-action or source note)
      {{logo_url}}    - Brand logo placeholder
      {{variant}}     - A, B, or C

    Variants:
      A — Vertical numbered steps with accent lines
      B — Icon/number grid (2-column layout)
      C — Flowchart style with vertical connectors
    -->

    <!-- ==================== VARIANT A: Vertical Numbered Steps ==================== -->
    <div class="pin-canvas variant-a" data-variant="A" style="display: none;">
        <div class="info-a-bg"></div>
        <div class="info-a-content safe-zone z-2">
            <div class="info-a-header">
                <div class="text-label color-accent" style="margin-bottom: 16px;">{{category_label}}</div>
                <h1 class="text-headline color-dark text-center">{{title}}</h1>
                <div class="accent-bar" style="margin: 24px auto;"></div>
            </div>
            <div class="info-a-steps">
                {{steps}}
            </div>
            <div class="info-a-footer">
                <div class="pin-cta pin-cta-light"><span class="pin-cta-text">{{cta_text}}</span></div>
                <p class="text-caption color-primary" style="opacity: 0.7; text-align: center;">{{footer_text}}</p>
                <div class="brand-logo" style="margin-top: 16px;">
                    <span class="brand-logo-icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#D97706" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#D97706" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#D97706" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-primary" style="font-size: 24px; opacity: 0.6;">Slated.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== VARIANT B: Number Grid ==================== -->
    <div class="pin-canvas variant-b" data-variant="B" style="display: none;">
        <div class="info-b-bg"></div>
        <div class="info-b-content safe-zone z-2">
            <div class="info-b-header">
                <h1 class="text-headline color-light text-center">{{title}}</h1>
                <div class="divider-line-light" style="width: 80px; margin: 24px auto;"></div>
            </div>
            <div class="info-b-grid">
                {{steps}}
            </div>
            <div class="info-b-footer">
                <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
                <p class="text-caption color-light" style="opacity: 0.6; text-align: center;">{{footer_text}}</p>
                <div class="brand-logo" style="margin-top: 16px;">
                    <span class="brand-logo-icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-light" style="font-size: 24px; opacity: 0.6;">Slated.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== VARIANT C: Flowchart / Timeline Style ==================== -->
    <div class="pin-canvas variant-c" data-variant="C" style="display: none;">
        <div class="info-c-bg"></div>
        <div class="info-c-content safe-zone z-2">
            <div class="info-c-header">
                <h1 class="text-headline color-light text-center">{{title}}</h1>
            </div>
            <div class="info-c-timeline">
                {{steps}}
            </div>
            <div class="info-c-footer">
                <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
                <p class="text-caption color-secondary" style="opacity: 0.6; text-align: center;">{{footer_text}}</p>
                <div class="brand-logo" style="margin-top: 16px;">
                    <span class="brand-logo-icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFBEB" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-secondary" style="font-size: 24px; opacity: 0.6;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
