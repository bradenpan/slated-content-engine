<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1000">
    <title>Listicle Pin</title>
    {{styles}}
</head>
<body>
    <!--
    Listicle Pin Template
    =====================
    "7 Easy Weeknight Dinners" style — number-prominent, list-forward.

    Variables:
      {{number}}              - The list count (e.g., "7", "5", "10")
      {{headline}}            - List title, 6-8 words max
      {{list_items}}          - HTML list items (generated by assembler from array)
      {{background_image_url}} - Background image (optional for some variants)
      {{logo_url}}            - Brand logo placeholder
      {{variant}}             - A, B, or C

    Variants:
      A — Large number with subtle background, centered composition
      B — Image top with number overlay badge, list below
      C — Clean graphic with numbered list items (no photo)
    -->

    <!-- ==================== VARIANT A: Large Number, Subtle Background ==================== -->
    <div class="pin-canvas variant-a" data-variant="A" style="display: none;">
        <div class="list-a-bg bg-image-cover" style="background-image: url('{{background_image_url}}');"></div>
        <div class="list-a-overlay"></div>
        <div class="list-a-content safe-zone z-2">
            <div class="list-a-number-wrap">
                <span class="text-number color-accent">{{number}}</span>
            </div>
            <h1 class="text-headline color-light text-center shadow-text">{{headline}}</h1>
            <div class="divider-line" style="width: 60px; margin: 28px auto;"></div>
            <div class="list-a-items">
                {{list_items}}
            </div>
            <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
            <div class="brand-logo" style="margin-top: auto; padding-top: 24px;">
                <span class="brand-logo-icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="brand-logo-text logo-light" style="font-size: 24px; opacity: 0.6;">Slated.</span>
            </div>
        </div>
    </div>

    <!-- ==================== VARIANT B: Image Top with Number Badge ==================== -->
    <div class="pin-canvas variant-b" data-variant="B" style="display: none;">
        <div class="list-b-image-section bg-image-cover" style="background-image: url('{{background_image_url}}');">
            <div class="list-b-badge">
                <span class="list-b-badge-number">{{number}}</span>
            </div>
        </div>
        <div class="list-b-text-section">
            <div class="list-b-text-inner safe-zone">
                <h1 class="text-headline color-dark text-center">{{headline}}</h1>
                <div class="accent-bar" style="margin: 20px auto;"></div>
                <div class="list-b-items">
                    {{list_items}}
                </div>
                <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
                <div class="brand-logo" style="margin-top: auto; padding-top: 16px;">
                    <span class="brand-logo-icon" style="width: 18px; height: 18px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#D97706" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#D97706" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#D97706" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-primary" style="font-size: 22px; opacity: 0.55;">Slated.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== VARIANT C: Clean Numbered List (No Photo) ==================== -->
    <div class="pin-canvas variant-c" data-variant="C" style="display: none;">
        <div class="list-c-bg"></div>
        <div class="list-c-content safe-zone z-2">
            <div class="list-c-header">
                <span class="list-c-number-inline">{{number}}</span>
                <h1 class="text-headline color-light">{{headline}}</h1>
            </div>
            <div class="divider-line" style="width: 100%; margin: 28px 0; opacity: 0.3;"></div>
            <div class="list-c-items">
                {{list_items}}
            </div>
            <div class="pin-cta"><span class="pin-cta-text">{{cta_text}}</span></div>
            <div class="brand-logo" style="margin-top: auto; padding-top: 20px;">
                <span class="brand-logo-icon" style="width: 20px; height: 20px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFBEB" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/><path d="M15 3.5v1" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/><path d="M9 3.5v1" stroke="#FFFBEB" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="brand-logo-text logo-secondary" style="font-size: 24px; opacity: 0.55;">Slated.</span>
            </div>
        </div>
    </div>
</body>
</html>
