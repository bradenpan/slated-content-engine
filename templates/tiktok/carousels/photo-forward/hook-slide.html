<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Photo Forward — Hook Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Photo Forward — Hook Slide
    ============================
    Real photo background (70%) with semi-transparent text overlay.
    Best for: recipes, food photography, transformations.

    Variables:
      {{headline}}              - Hook headline over photo
      {{subtitle}}              - Supporting line
      {{background_image_url}}  - Full-bleed photo (1080x1920)
    -->
    <div class="slide-canvas pf-hook">
        <div class="pf-bg bg-image-cover" style="background-image: url('{{background_image_url}}');"></div>
        <div class="pf-gradient"></div>
        <div class="safe-zone z-10">
            <div class="pf-hook-content">
                <h1 class="text-display color-light shadow-text pf-hook-headline">{{headline}}</h1>
                <p class="text-subheadline color-light shadow-text-subtle pf-hook-subtitle">{{subtitle}}</p>
            </div>
            <div class="pf-hook-footer">
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-light" style="font-size: 26px; opacity: 0.5;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
