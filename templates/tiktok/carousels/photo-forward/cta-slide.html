<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Photo Forward — CTA Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Photo Forward — CTA Slide
    ===========================
    Full-bleed photo with gradient overlay and CTA text.

    Variables:
      {{cta_primary}}           - Primary CTA text
      {{cta_secondary}}         - Secondary CTA text
      {{handle}}                - TikTok handle — PLACEHOLDER: see implementation-plan.md Open Decision #2
      {{background_image_url}}  - Full-bleed photo
    -->
    <div class="slide-canvas pf-cta">
        <div class="pf-bg bg-image-cover" style="background-image: url('{{background_image_url}}');"></div>
        <div class="pf-gradient-heavy"></div>
        <div class="safe-zone z-10">
            <div class="pf-cta-content">
                <h2 class="text-headline color-light shadow-text pf-cta-primary">{{cta_primary}}</h2>
                <p class="text-subheadline color-light shadow-text-subtle pf-cta-secondary">{{cta_secondary}}</p>
                <div class="pf-cta-handle">
                    <span class="handle-text color-light">{{handle}}</span>
                </div>
            </div>
            <div class="pf-cta-footer">
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-light" style="font-size: 26px; opacity: 0.5;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
