<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Dark Bold — Hook Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Dark Bold — Hook Slide
    =======================
    High-contrast white/accent text on dark background.
    Best for: bold claims, contrarian takes, shocking stats.

    Variables:
      {{headline}}     - Hook headline, punchy and short
      {{subtitle}}     - Supporting context line
    -->
    <div class="slide-canvas db-hook">
        <div class="safe-zone">
            <div class="db-hook-content">
                <div class="db-accent-line"></div>
                <h1 class="text-display color-light db-hook-headline">{{headline}}</h1>
                <p class="text-subheadline db-hook-subtitle">{{subtitle}}</p>
            </div>
            <div class="db-hook-footer">
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-light" style="font-size: 26px; opacity: 0.4;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
