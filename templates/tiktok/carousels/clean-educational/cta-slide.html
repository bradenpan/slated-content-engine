<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Clean Educational — CTA Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Clean Educational — CTA Slide
    ==============================
    Call-to-action with handle and action prompts.

    Variables:
      {{cta_primary}}   - Primary CTA text (e.g., "Save this for later")
      {{cta_secondary}} - Secondary CTA text (e.g., "Follow for more meal prep tips")
      {{handle}}        - TikTok handle (e.g., "@slated") — PLACEHOLDER: see implementation-plan.md Open Decision #2
    -->
    <div class="slide-canvas ce-cta">
        <div class="safe-zone">
            <div class="ce-cta-content">
                <div class="accent-bar" style="width: 80px; margin-bottom: 40px;"></div>
                <h2 class="text-headline color-dark ce-cta-primary">{{cta_primary}}</h2>
                <p class="text-subheadline color-muted ce-cta-secondary">{{cta_secondary}}</p>
                <div class="ce-cta-handle">
                    <span class="handle-text color-accent">{{handle}}</span>
                </div>
            </div>
            <div class="ce-cta-footer">
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#D97706" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-primary" style="font-size: 26px; opacity: 0.5;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
