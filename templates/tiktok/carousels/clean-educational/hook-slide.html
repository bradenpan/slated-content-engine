<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Clean Educational — Hook Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Clean Educational — Hook Slide
    ===============================
    Light background, bold dark headlines, numbered slides.
    Best for: listicles, how-tos, tips.

    Variables:
      {{headline}}     - Hook headline, 6-10 words max
      {{subtitle}}     - Supporting line, 8-15 words
    -->
    <div class="slide-canvas ce-hook">
        <div class="safe-zone">
            <div class="ce-hook-content">
                <div class="accent-bar"></div>
                <h1 class="text-display color-dark ce-hook-headline">{{headline}}</h1>
                <p class="text-subheadline color-muted ce-hook-subtitle">{{subtitle}}</p>
                <div class="ce-swipe-hint">
                    <span class="text-caption color-accent">Swipe to learn more →</span>
                </div>
            </div>
            <div class="ce-hook-footer">
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#D97706" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-primary" style="font-size: 26px; opacity: 0.5;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
