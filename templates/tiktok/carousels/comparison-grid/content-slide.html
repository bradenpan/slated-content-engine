<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Comparison Grid — Content Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Comparison Grid — Content Slide
    =================================
    Split-panel comparison layout.

    Variables:
      {{headline}}       - Slide headline (comparison topic)
      {{body_text}}      - Main content text (for single-column mode)
      {{left_label}}     - Left panel label (e.g., "Before", "Without Slated")
      {{right_label}}    - Right panel label (e.g., "After", "With Slated")
      {{left_text}}      - Left panel content
      {{right_text}}     - Right panel content
      {{slide_number}}   - Current slide number
      {{total_slides}}   - Total slide count
      {{list_items}}     - Optional: pre-built HTML list items (replaces split panels)
    -->
    <div class="slide-canvas cg-content">
        <div class="safe-zone">
            <div class="cg-content-header">
                <span class="slide-indicator color-muted">{{slide_number}} / {{total_slides}}</span>
            </div>
            <h2 class="text-headline color-dark cg-content-headline">{{headline}}</h2>
            <div class="cg-split-panels">
                <div class="cg-panel cg-panel-left">
                    <div class="cg-panel-label">
                        <span class="text-label color-light">{{left_label}}</span>
                    </div>
                    <div class="text-body color-dark cg-panel-text">{{left_text}}</div>
                </div>
                <div class="cg-panel-divider"></div>
                <div class="cg-panel cg-panel-right">
                    <div class="cg-panel-label cg-panel-label-accent">
                        <span class="text-label color-light">{{right_label}}</span>
                    </div>
                    <div class="text-body color-dark cg-panel-text">{{right_text}}</div>
                </div>
            </div>
            <div class="cg-content-body text-body color-dark">{{body_text}}</div>
            <div class="cg-content-list">{{list_items}}</div>
        </div>
    </div>
</body>
</html>
