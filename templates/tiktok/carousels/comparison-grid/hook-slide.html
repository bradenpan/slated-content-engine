<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1080">
    <title>Comparison Grid — Hook Slide</title>
    {{styles}}
</head>
<body>
    <!--
    Comparison Grid — Hook Slide
    ==============================
    Split panels, structured data, balanced layout.
    Best for: before/after, comparisons, pros/cons.

    Variables:
      {{headline}}     - Hook headline setting up the comparison
      {{subtitle}}     - Supporting context
    -->
    <div class="slide-canvas cg-hook">
        <div class="safe-zone">
            <div class="cg-hook-content">
                <div class="cg-hook-vs-badge">
                    <span class="text-label color-light">VS</span>
                </div>
                <h1 class="text-display color-dark cg-hook-headline">{{headline}}</h1>
                <p class="text-subheadline color-muted cg-hook-subtitle">{{subtitle}}</p>
                <div class="cg-swipe-hint">
                    <span class="text-caption color-accent">Swipe to compare →</span>
                </div>
            </div>
            <div class="cg-hook-footer">
                <div class="brand-logo">
                    <span class="brand-logo-icon" style="width: 22px; height: 22px;"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 16c0-5 4-9 10-9s10 4 10 9v2H2v-2z" fill="none" stroke="#D97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 7c1-1.5 3-1.5 4 0" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/><path d="M12 3v2" stroke="#D97706" stroke-width="2" stroke-linecap="round"/></svg></span>
                    <span class="brand-logo-text logo-primary" style="font-size: 26px; opacity: 0.5;">Slated.</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
